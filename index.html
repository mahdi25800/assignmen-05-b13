<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- Font-FAmily -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
 <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    * {
        font-family: "Manrope", sans-serif;
    }
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo pt-[50px]">
       <img src="./assets/github-logo.png" class="mx-auto">
    </div>
    <div class="logo-title text-center ">
      <h1 class="font-bold text-2xl text-{#1F2937}">GitHub Issues Tracker</h1>
      <pi class="text-{#1F2937}">Sign in to manage your issues</pi>
    </div>
    <div class="from pt-10">
         <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold text-{#1F2937}">Username</label>
          <input id="input-number" maxlength="" minlength="" type="text" class="input rounded bg-base-200 text-{#1F2937}" value="" placeholder="Enter Username " />
          <br>
          <label class="label text-neutral font-bold text-{#1F2937}">Password</label>
          <input id="input-pin" maxlength="" minlength="" type="password" class="input  rounded bg-base-200 text-{#1F2937}" placeholder="Enter password" />
          <div></div>
          <button id="login-btn" class="btn btn-primary mt-4 rounded">Sign In</button>
        </fieldset>
      </div>
    </div>
    </div>
    <script src="./folder/login.js">

    </script>
</body>
</html>
